<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Server Status</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }
    .box {
      text-align: center;
      padding: 30px;
      border: 1px solid #334155;
      border-radius: 16px;
      background: #111827;
    }
    h1 {
      color: #22c55e;
      margin-bottom: 10px;
    }
    p {
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Backend Running ✅</h1>
    <p>Your Node.js server is live and working on Render.</p>
  </div>
</body>
</html>
